{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - After The Credits</title>
    <link rel="stylesheet" href="{% static 'stylesheet.css' %}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card_logo_container">
            <div class="auth-card__logo">
                <a href="{% url 'core:home' %}" class="navbar__logo">
                    <img src="{% static 'media/Logo.png' %}" alt="After The Credits">
                </a>
            </div>
        </div>

        <h1 class="auth-card__title">Reset password</h1>
        <p class="auth-card__subtitle">Enter your email and we will send you a 6-digit code.</p>

        <form method="post" novalidate class="form-light">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.email.id_for_label }}">Email</label>
                {{ form.email }}
                {% if form.email.errors %}
                    <ul class="form-errors">
                        {% for e in form.email.errors %}<li>{{ e }}</li>{% endfor %}
                    </ul>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-dark" style="width:100%; margin-top: 8px;">
                Send Code
            </button>
        </form>

        <p class="auth-card__footer">
            Remembered it? <a href="{% url 'users:login' %}">Log in</a>
        </p>
    </div>
</div>
</body>
</html>
